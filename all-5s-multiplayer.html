        /* 3D Domino styling */
        .domino-3d {
            position: fixed;
            width: 80px;
            height: 160px;
            background: linear-gradient(145deg, #ffffff 0%, #f8f8f0 50%, #f0ebe0 100%);
            border: 3px solid #2d2d2d;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            box-shadow: 
                10px 10px 30px rgba(0, 0, 0, 0.4),
                -5px -5px 20px rgba(255, 255, 255, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.9),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            transform-style: preserve-3d;
            animation: float3d 8s ease-in-out infinite;
            z-index: 1;
        }

        .domino-3d::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            border-radius: 6px;
            pointer-events: none;
        }

        .domino-3d-1 {
            top: 8%;
            left: 5%;
            transform: rotate(-15deg) rotateX(10deg) rotateY(-10deg);
            animation-delay: 0s;
        }

        .domino-3d-2 {
            bottom: 12%;
            right: 6%;
            transform: rotate(20deg) rotateX(-5deg) rotateY(15deg);
            animation-delay: 2s;
        }

        @keyframes float3d {
            0%, 100% { 
                transform: rotate(-15deg) rotateX(10deg) rotateY(-10deg) translateY(0);
            }
            50% { 
                transform: rotate(-15deg) rotateX(10deg) rotateY(-10deg) translateY(-20px);
            }

            flex: 1;
            display: flex;

            justify-content: center;
            border-bottom: 2px solid #888;

            gap: 4px;
            width: 50px;
            height: 50px;
            padding: 6px;

            transition: all 0.3s ease;
        }

        .chat-send-btn:hover {
            background: linear-gradient(145deg, #a0522d, #cd853f);
            transform: translateY(-2px);
        }

        .connection-status {
            padding: 8px 16px;
            text-align: center;
            font-size: 0.85rem;
            background: rgba(139, 90, 43, 0.1);
            border-bottom: 1px solid #8b5a2b;
            color: #5c4a3d;
        }

        .connection-status.connected {
            color: #2d5a2d;
            background: rgba(139, 90, 43, 0.15);
        }

        .connection-status.disconnected {
            color: #8b2d2d;
            background: rgba(139, 90, 43, 0.15);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .chat-video-btn {
                top: calc(16px + env(safe-area-inset-top));
                right: 16px;
                bottom: auto;
                padding: 12px 16px;
                background: rgba(255, 255, 255, 0.98);
                z-index: 2000;
            }

            .chat-video-btn svg {
                width: 22px;
                height: 22px;
            }

            .chat-video-panel {
                width: 100%;
                right: -100%;
                top: 0;
                padding-top: env(safe-area-inset-top);
            }

            .chat-video-panel.open {
                right: 0;
            }

            .panel-header {
                padding-top: calc(16px + env(safe-area-inset-top));
            }

            .panel-header h3 {
                font-size: 1rem;
            }

            .video-wrapper {
                aspect-ratio: 16/9;
                min-height: 150px;
            }

            .video-section {
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            .video-controls {
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
            }

            .chat-input {
                height: 44px;
            }

            .chat-input-container {
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
            }
        }

        @media (max-width: 480px) {
            .chat-video-btn {
                top: calc(12px + env(safe-area-inset-top));
                right: 12px;
                bottom: auto;
                padding: 10px 14px;
                z-index: 2000;
            }

            .panel-tab {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .chat-message {
                max-width: 90%;
            }

            .video-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="lobby-mode">
    <!-- 3D Dominoes Background -->
    <div class="domino-3d domino-3d-1">
        <div class="domino-half">
            <div class="pips" data-value="5">
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
            </div>
        </div>
        <div class="domino-half">
            <div class="pips" data-value="3">
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
            </div>
        </div>
    </div>

    <div class="domino-3d domino-3d-2">
        <div class="domino-half">
            <div class="pips" data-value="6">
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
            </div>
        </div>
        <div class="domino-half">
            <div class="pips" data-value="6">
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
                <div class="pip"></div>
            </div>
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="lobby-content">
        <h1>All 5s Dominoes</h1>
        <p class="subtitle">Multiplayer</p>
        
        <div class="lobby-buttons">
            <button id="createLobbyBtn" class="lobby-btn">Create Lobby</button>
            <button id="joinLobbyBtn" class="lobby-btn">Join Lobby</button>
        </div>
        
        <div id="joinSection" class="join-section hidden">
            <input type="text" id="lobbyIdInput" placeholder="Enter Lobby ID" class="lobby-input">
            <button id="joinGameBtn" class="lobby-btn">Join Game</button>
        </div>
        
        <div id="lobbyInfo" class="lobby-info hidden">
            <p>Your Lobby ID:</p>
            <p><strong id="lobbyIdDisplay"></strong></p>
            <p>Share this ID with your opponent</p>
            <p id="connectionStatus">Waiting for opponent...</p>
        </div>
    </div>

    <!-- Burger Menu Button (hidden initially) -->
    <button id="burgerBtn" class="chat-video-btn hidden">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
    </button>

    <!-- Chat/Video Panel -->
    <div id="chatVideoPanel" class="chat-video-panel">
        <div class="panel-header">
            <h3>Menu</h3>
            <button id="closePanelBtn" class="close-panel-btn">×</button>
        </div>
        <div class="panel-tabs">
            <button class="panel-tab active" data-tab="game-info">Game Info</button>
            <button class="panel-tab" data-tab="chat">Chat</button>
            <button class="panel-tab" data-tab="video">Video</button>
        </div>
        <div class="panel-content">
            <!-- Game Info Section -->
            <div id="gameInfoSection" class="panel-section active">
                <div class="game-info-section">
                    <div class="game-info-item">
                        <div class="game-info-label">Last Played:</div>
                        <div class="game-info-domino" id="panelLastPlayedDomino"></div>
                    </div>
                    <div class="game-info-item">
                        <div class="game-info-label">Points:</div>
                        <div class="game-info-text" id="panelScoringBreakdownText"></div>
                    </div>
                </div>
            </div>
            <!-- Chat Section -->
            <div id="chatSection" class="panel-section">
                <div class="connection-status" id="chatConnectionStatus">Not connected</div>
                <div class="chat-section">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-container">
                        <textarea id="chatInput" class="chat-input" placeholder="Type a message..."></textarea>
                        <button id="chatSendBtn" class="chat-send-btn">Send</button>
                    </div>
                </div>
            </div>
            <!-- Video Section -->
            <div id="videoSection" class="panel-section">
                <div class="connection-status" id="videoConnectionStatus">Not connected</div>
                <div class="video-section">
                    <div class="video-container">
                        <div class="video-wrapper">
                            <video id="localVideo" autoplay muted playsinline></video>
                            <div class="video-label">You</div>
                        </div>
                        <div class="video-wrapper">
                            <video id="remoteVideo" autoplay playsinline></video>
                            <div class="video-label">Opponent</div>
                        </div>
                    </div>
                    <div class="video-controls">
                        <button id="startVideoBtn" class="video-btn">Start Video</button>
                        <button id="endVideoBtn" class="video-btn end-call" disabled>End Call</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Screen (hidden initially) -->
    <div id="gameScreen" class="game-container hidden">
        <div class="score-bar">
            <div class="score-item">
                <h2>Opponent</h2>
                <div class="score-display" id="opponentScore">0</div>
            </div>
            <div class="boneyard" id="boneyard">
                <h3>Boneyard: <span id="boneyardCount">0</span></h3>
                <button id="drawBtn" class="draw-btn">Draw</button>
            </div>
            <div class="score-item">
                <h2>You</h2>
                <div class="score-display" id="playerScore">0</div>
            </div>
        </div>
        
        <div class="board-container">
            <div class="camera-layer" id="cameraLayer">
                <div class="board" id="board"></div>
            </div>
            <div class="zone-hint-arrows" id="zoneHintArrows"></div>
            <div class="turn-indicator hidden" id="turnIndicator"></div>
        </div>
        
        <div class="player-rack">
            <div class="rack-scroll-indicator left hidden" id="rackScrollLeft">
                <div class="indicator-domino">
                    <div class="indicator-half"></div>
                    <div class="indicator-half"></div>
                </div>
                <div class="indicator-label" id="rackScrollLeftLabel"></div>
                <div class="indicator-arrow">◀</div>
            </div>
            <div class="rack" id="playerRack"></div>
            <div class="rack-scroll-indicator right hidden" id="rackScrollRight">
                <div class="indicator-domino">
                    <div class="indicator-half"></div>
                    <div class="indicator-half"></div>
                </div>
                <div class="indicator-label" id="rackScrollRightLabel"></div>
                <div class="indicator-arrow">▶</div>
            </div>
            <button class="new-game-mini-btn hidden" id="newGameMiniBtn">New Game</button>
        </div>
    </div>

    <div class="hint-toast hidden" id="hintToast"></div>

    <div class="game-over-overlay hidden" id="gameOverOverlay">
        <div class="game-over-modal">
            <button class="game-over-close-btn" id="closeGameOverBtn">×</button>
            <h2 id="gameOverTitle">Game Over</h2>
            <p id="gameOverMessage"></p>
            <p class="game-over-scores" id="gameOverScores"></p>
            <div class="game-over-dominoes" id="gameOverDominoes"></div>
            <button class="game-over-btn" id="continueBtn" style="display: none;">Continue</button>
            <button class="game-over-btn" id="playAgainBtn">Play Again</button>
        </div>
    </div>
    
    <script src="all-5s-multiplayer.js"></script>
</body>
</html>
