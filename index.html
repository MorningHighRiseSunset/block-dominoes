<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Fives Dominoes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #F9EFDD;
            overflow: hidden;
            position: relative;
        }

        /* 3D Domino styling */
        .domino-3d {
            position: fixed;
            width: 80px;
            height: 160px;
            background: linear-gradient(145deg, #ffffff 0%, #f8f8f0 50%, #f0ebe0 100%);
            border: 3px solid #2d2d2d;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            box-shadow: 
                10px 10px 30px rgba(0, 0, 0, 0.4),
                -5px -5px 20px rgba(255, 255, 255, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.9),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            transform-style: preserve-3d;
            animation: float3d 8s ease-in-out infinite;
        }

        .domino-3d::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            border-radius: 6px;
            pointer-events: none;
        }

        .domino-3d-1 {
            top: 8%;
            left: 5%;
            transform: rotate(-15deg) rotateX(10deg) rotateY(-10deg);
            animation-delay: 0s;
        }

        .domino-3d-2 {
            bottom: 12%;
            right: 6%;
            transform: rotate(20deg) rotateX(-5deg) rotateY(15deg);
            animation-delay: 2s;
        }

        .domino-3d-3 {
            top: 45%;
            right: 12%;
            transform: rotate(-10deg) rotateX(15deg) rotateY(-5deg);
            animation-delay: 4s;
        }

        .domino-3d-4 {
            bottom: 25%;
            left: 8%;
            transform: rotate(25deg) rotateX(-10deg) rotateY(10deg);
            animation-delay: 1s;
        }

        @keyframes float3d {
            0%, 100% { 
                transform: rotate(-15deg) rotateX(10deg) rotateY(-10deg) translateY(0);
            }
            50% { 
                transform: rotate(-15deg) rotateX(10deg) rotateY(-10deg) translateY(-20px);
            }
        }

        .domino-half {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #888;
        }

        .domino-half:last-child {
            border-bottom: none;
        }

        .pips {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: 50px;
            height: 50px;
            padding: 6px;
        }

        .pip {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #4a4a4a 0%, #1a1a1a 70%, #000000 100%);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6);
        }

        .pips[data-value="0"] .pip { display: none; }
        .pips[data-value="1"] .pip:nth-child(5) { display: block; }
        .pips[data-value="1"] .pip:not(:nth-child(5)) { display: none; }
        .pips[data-value="2"] .pip:nth-child(1), .pips[data-value="2"] .pip:nth-child(9) { display: block; }
        .pips[data-value="2"] .pip:not(:nth-child(1)):not(:nth-child(9)) { display: none; }
        .pips[data-value="3"] .pip:nth-child(1), .pips[data-value="3"] .pip:nth-child(5), .pips[data-value="3"] .pip:nth-child(9) { display: block; }
        .pips[data-value="3"] .pip:not(:nth-child(1)):not(:nth-child(5)):not(:nth-child(9)) { display: none; }
        .pips[data-value="4"] .pip:nth-child(1), .pips[data-value="4"] .pip:nth-child(3), .pips[data-value="4"] .pip:nth-child(7), .pips[data-value="4"] .pip:nth-child(9) { display: block; }
        .pips[data-value="4"] .pip:not(:nth-child(1)):not(:nth-child(3)):not(:nth-child(7)):not(:nth-child(9)) { display: none; }
        .pips[data-value="5"] .pip:nth-child(1), .pips[data-value="5"] .pip:nth-child(3), .pips[data-value="5"] .pip:nth-child(5), .pips[data-value="5"] .pip:nth-child(7), .pips[data-value="5"] .pip:nth-child(9) { display: block; }
        .pips[data-value="5"] .pip:not(:nth-child(1)):not(:nth-child(3)):not(:nth-child(5)):not(:nth-child(7)):not(:nth-child(9)) { display: none; }
        .pips[data-value="6"] .pip:nth-child(1), .pips[data-value="6"] .pip:nth-child(2), .pips[data-value="6"] .pip:nth-child(3), .pips[data-value="6"] .pip:nth-child(7), .pips[data-value="6"] .pip:nth-child(8), .pips[data-value="6"] .pip:nth-child(9) { display: block; }
        .pips[data-value="6"] .pip:not(:nth-child(1)):not(:nth-child(2)):not(:nth-child(3)):not(:nth-child(7)):not(:nth-child(8)):not(:nth-child(9)) { display: none; }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px 60px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(249, 239, 221, 0.95) 100%);
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15), 0 5px 20px rgba(0, 0, 0, 0.1);
            border: 3px solid #d4c4a8;
        }

        h1 {
            font-size: 3.5rem;
            color: #5c4a3d;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            animation: slideDown 1s ease-out;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #8b5a2b;
            margin-bottom: 40px;
            font-weight: bold;
            animation: slideUp 1s ease-out 0.3s backwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            margin-bottom: 0;
            animation: fadeIn 1s ease-out 0.6s backwards;
        }

        .mode-button {
            padding: 18px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(145deg, #d4a574, #c4956a);
            border: 2px solid #a67c52;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 16px rgba(166, 124, 82, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-width: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mode-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .mode-button:hover::before {
            left: 100%;
        }

        .mode-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(166, 124, 82, 0.5);
            background: linear-gradient(145deg, #e0b896, #d4a574);
        }

        .mode-button:active {
            transform: translateY(-2px);
        }

        .wip-badge {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(238, 90, 90, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .mode-button {
                padding: 15px 40px;
                font-size: 1rem;
                min-width: 280px;
            }

            .domino-3d {
                width: 60px;
                height: 120px;
            }

            .pips {
                width: 40px;
                height: 40px;
            }

            .pip {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>
